apis:
  - name: Substack Developer API
    description: >-
      Narrowly scoped official API that returns public Substack profile data
      for a given LinkedIn handle. Access requires accepting the Developer
      API Terms of Use, applying via form, and generating a token from the
      Developer API section of account settings. Only profiles meeting
      Substack's authenticity thresholds are returned.
    humanURL: https://support.substack.com/hc/en-us/articles/45099095296916-Substack-Developer-API
    baseURL: https://substack.com
    tags:
      - Profile
      - LinkedIn
      - Read-Only
      - Gated
    properties:
      - type: Documentation
        url: https://support.substack.com/hc/en-us/articles/45099095296916-Substack-Developer-API
  - name: Substack RSS Feeds
    description: >-
      Per-publication public RSS feeds available at
      https://{publication}.substack.com/feed for syndication and read-only
      access to posts.
    humanURL: https://support.substack.com/hc/en-us/articles/360037466012
    baseURL: https://{publication}.substack.com
    tags:
      - RSS
      - Read-Only
      - Syndication
    properties:
      - type: Documentation
        url: https://support.substack.com/hc/en-us/articles/360037466012
