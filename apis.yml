aid: substack
name: Substack
description: >-
  Substack is an independent newsletter and media platform that lets writers,
  podcasters, video creators, and other culture makers publish directly to
  readers and monetize through paid subscriptions. Founded in 2017 by Chris
  Best (CEO), Jairaj Sethi (CTO), and Hamish McKenzie (CWO) and headquartered
  in San Francisco with a New York City office, Substack provides built-in
  subscription billing, paid posts, podcasting, chat, video, Notes, and a
  cross-publication recommendations network. Creators keep 90 percent of
  subscription revenue (less credit card fees) and own their mailing lists
  and content. The platform reports more than five million paid subscriptions
  and tens of millions of weekly active readers. Substack does not offer a
  general-purpose public REST API for managing publications, posts, or
  subscribers. It does publish a narrowly scoped official Developer API
  (released April 2026) that allows token-authenticated lookup of public
  Substack profiles by LinkedIn handle, gated by an application and
  Terms-of-Use process. Read access to public content is otherwise available
  via per-publication RSS feeds, and the broader integration ecosystem relies
  on reverse-engineered, unofficial JSON endpoints used by the Substack web
  application.
